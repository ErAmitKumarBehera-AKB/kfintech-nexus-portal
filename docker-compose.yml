version: '3.8'

services:
  # FastAPI AI Models Backend
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: kfintech_backend
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=development
      - HOST=0.0.0.0
    volumes:
      - ./backend:/app
    networks:
      - kfintech-network

  # Local MongoDB Replica Set for strict transactions
  mongodb:
    image: mongo:latest
    container_name: kfintech_mongo
    command: ["--replSet", "rs0", "--bind_ip_all", "--port", "27017"]
    ports:
      - "27018:27017"
    networks:
      - kfintech-network

  # Placeholder for Node.js (e.g. Express/NestJS)
  # node_service:
  #   build:
  #     context: ../node_service_path
  #   ports:
  #     - "3000:3000"
  #   networks:
  #     - kfintech-network

  # Placeholder for React Frontend
  # frontend:
  #   build:
  #     context: ../frontend_path
  #   ports:
  #     - "3001:3001"
  #   networks:
  #     - kfintech-network

networks:
  kfintech-network:
    driver: bridge
