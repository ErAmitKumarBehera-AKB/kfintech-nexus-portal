version: '3.8'

services:
  # FastAPI AI Models Backend
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: kfintech_backend
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=development
      - HOST=0.0.0.0
    volumes:
      - ./backend:/app
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - kfintech-network

  # Local MongoDB Replica Set for strict transactions
  mongodb:
    image: mongo:latest
    container_name: kfintech_mongo
    command: ["--replSet", "rs0", "--bind_ip_all", "--port", "27017"]
    ports:
      - "27018:27017"
    networks:
      - kfintech-network

  # Node.js (Express/NestJS) Backend
  node_service:
    build:
      context: ./node_service
      dockerfile: Dockerfile
    container_name: kfintech_node
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/kfintech_nexus?directConnection=true
      - ML_SERVICE_URL=http://backend:8000
    volumes:
      - ./node_service:/app
      - /app/node_modules
    depends_on:
      - mongodb
      - backend
    networks:
      - kfintech-network

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kfintech_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - node_service
    networks:
      - kfintech-network

  # Local Llama 3 AI Engine
  ollama:
    image: ollama/ollama:latest
    container_name: kfintech_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: ["/bin/sh", "-c", "ollama serve & sleep 10 && ollama pull llama3.2:1b && wait"]
    networks:
      - kfintech-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

networks:
  kfintech-network:
    driver: bridge

volumes:
  ollama_data:


